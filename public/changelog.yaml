changelog:
  - version: 0.6.8
    date: 2026-03-25
    summary: 认证完善
    entries:
      - type: 新增
        text: 新增邮箱注册、邮箱验证提示页和重新发送验证邮件入口。
      - type: 优化
        text: 邮箱密码登录改为强制邮箱验证后才能完成登录，并补充验证邮件模板。
      - type: 变更
        text: 站内密码登录入口改为仅支持邮箱登录，不再支持通过用户名登录。
      - type: 维护
        text: 升级 better-auth、Amazon SES SDK、yaml、@types/pg 与 oxlint 到最新补丁版本。
  - version: 0.6.7
    date: 2026-03-20
    summary: 安全排查
    entries:
      - type: 新增
        text: 新增服务端请求审计快照输出，会在根目录 audit 中持续写出访问 IP TOP 100 与请求次数，便于排查异常流量。
  - version: 0.6.6
    date: 2026-03-20
    summary: 工程维护
    entries:
      - type: 变更
        text: 移除 ESLint 与 Nuxt ESLint 模块，统一改为使用 Oxlint 进行代码检查。
  - version: 0.6.5
    date: 2026-03-20
    summary: 安全增强
    entries:
      - type: 优化
        text: 登录限流改为同时覆盖用户名和邮箱登录入口，并支持复用 Redis 提升跨实例稳定性。
      - type: 优化
        text: 找回密码增加按邮箱冷却与按 IP 限流，降低重置邮件被频繁触发的风险。
  - version: 0.6.4
    date: 2026-03-20
    summary: 新增
    entries:
      - type: 新增
        text: 新增基于 Better Auth 和 Amazon SES 的找回密码与重置密码流程。
  - version: 0.6.3
    date: 2026-01-26
    summary: 修复
    entries:
      - type: 修复
        text: 修复布局中的移动端评论面板导致的 Hydration 不一致警告。
      - type: 修复
        text: 修复作者粉丝历史查询在按天聚合时的数据库报错。
  - version: 0.6.2
    date: 2026-01-26
    summary: 修复
    entries:
      - type: 修复
        text: 移动端增加评论面板入口。
  - version: 0.6.1
    date: 2026-01-21
    summary: 新增
    entries:
      - type: 新增
        text: 新增 Bilibili UP 主粉丝数 Shield 接口，支持 Bilibili 图标。
  - version: 0.6.0
    date: 2026-01-18
    summary: 新增与修复
    entries:
      - type: 新增
        text: UP 主详情页外链增加跳转图标，直播中可直达直播间，无直播间不再显示状态。
      - type: 新增
        text: UP 主详情页支持跳转 B站个人主页，并区分未开播与无直播间。
      - type: 优化
        text: 优化 Bilibili 入口页 SEO 描述信息。
      - type: 修复
        text: 无直播间时不再显示直播礼物聚合模块。
      - type: 修复
        text: 消耗积分的操作后立即刷新账户积分。
      - type: 修复
        text: 未找到 UP 主时，详情页仍可触发观测。
  - version: 0.5.0
    date: 2026-01-16
    entries:
      - type: 新增
        text: 新增站点地图配置并在 robots 中限制私有页面。
      - type: 变更
        text: 首页日志流改为手动开启后才会连接并显示。
      - type: 变更
        text: 开启日志流时，首页 Live2D 角色不再鼠标追踪并以闭眼过渡维持目视前方。
      - type: 优化
        text: UP 主详情页将排名百分比查询拆分为独立接口，避免 SSR 阶段耗时。
      - type: 修复
        text: 修复直播礼物聚合表格对齐，并按北京时间聚合日期，避免误判为无直播间数据。
  - version: 0.4.0
    date: 2026-01-15
    summary: 性能与功能更新
    entries:
      - type: 优化
        text: 并行化 UP 主详情查询，并合并排名查询以降低响应耗时。
      - type: 新增
        text: 新增 UP 主粉丝数及 7 日/1 日变化的百分位与排名展示。
  - version: 0.3.0
    date: 2026-01-13
    summary: 特性与修复
    entries:
      - type: 新增
        text: 添加了首页酷炫的日志展示。
      - type: 优化
        text: 改善了文本大小。
  - version: 0.2.0
    date: 2026-01-12
    summary: 新增页面与展示
    entries:
      - type: 新增
        text: 添加了赞助者相关的页面。
      - type: 新增
        text: 添加了最近访问的显示。
      - type: 新增
        text: 添加了更新日志页面。
      - type: 新增
        text: 添加了修改密码的功能。
      - type: 新增
        text: 添加了评论功能。
  - version: 0.1.0
    date: 2026-01-11
    summary: 网站重写
    entries:
      - type: 其他
        text: 重写整个网站。
